openapi: 3.0.0
info:
  title: ProviEmplea API
  version: 1.0.0
  description: >
    API REST para la plataforma de empleo ProviEmplea de Providencia. 
    
    **Optimizaciones de Rendimiento:**
    * **Rate Limiting:** Todas las rutas están limitadas a 60 peticiones por minuto por IP para prevenir abusos. En caso de exceder el límite, la API retornará un código `429 Too Many Requests`.
    * **Caché:** El endpoint de estadísticas (`/admin/estadisticas`) utiliza caché en memoria con un TTL (Time To Live) de 5 minutos (300 segundos) para reducir la carga sobre la base de datos y mejorar los tiempos de respuesta.
servers:
  - url: http://localhost:8080/api
    description: Servidor de desarrollo local
tags:
  - name: Health
    description: Endpoints de salud del sistema
  - name: Personas
    description: Gestión de perfiles de talentos/vecinos
  - name: Empresas
    description: Gestión de empresas empleadoras
  - name: Administración
    description: Gestión administrativa y seguimiento

paths:
  /health:
    get:
      tags:
        - Health
      summary: Verificar estado del servicio
      operationId: healthCheck
      responses:
        '200':
          description: Servicio operativo
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: online
                  service:
                    type: string
                    example: ProviEmplea API
                  version:
                    type: string
                    example: 1.0.0
                  timestamp:
                    type: string
                    format: date-time

  /personas:
    get:
      tags:
        - Personas
      summary: Listar personas (CV ciego)
      operationId: getPersonas
      parameters:
        - name: validado
          in: query
          schema:
            type: boolean
        - name: nivel_educacional
          in: query
          schema:
            type: string
            enum: [basica, media, tecnica, universitaria, postgrado]
      responses:
        '200':
          description: Listado exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PersonaCVCiego'
    post:
      tags:
        - Personas
      summary: Registrar nueva persona/talento
      operationId: createPersona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaInput'
      responses:
        '201':
          description: Persona creada
        '422':
          description: Errores de validación

  /personas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Personas
      summary: Obtener persona por ID
      operationId: getPersona
      responses:
        '200':
          description: Persona encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
        '404':
          description: No encontrada
    put:
      tags:
        - Personas
      summary: Actualizar persona
      operationId: updatePersona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaInput'
      responses:
        '200':
          description: Persona actualizada
        '404':
          description: No encontrada
        '422':
          description: Errores de validación
    delete:
      tags:
        - Personas
      summary: Desactivar persona
      operationId: deletePersona
      responses:
        '200':
          description: Persona desactivada

  /personas/{id}/validar:
    patch:
      tags:
        - Personas
      summary: Validar persona (solo administración)
      operationId: validarPersona
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Persona validada
        '404':
          description: No encontrada

  /empresas:
    get:
      tags:
        - Empresas
      summary: Listar empresas validadas
      operationId: getEmpresas
      parameters:
        - name: tipo_empresa
          in: query
          schema:
            type: string
            enum: [contratacion-directa, est, outsourcing]
      responses:
        '200':
          description: Listado exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Empresa'
    post:
      tags:
        - Empresas
      summary: Registrar nueva empresa
      operationId: createEmpresa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpresaInput'
      responses:
        '201':
          description: Empresa creada
        '422':
          description: Errores de validación

  /empresas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Empresas
      summary: Obtener empresa por ID
      operationId: getEmpresa
      responses:
        '200':
          description: Empresa encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empresa'
        '404':
          description: No encontrada
    put:
      tags:
        - Empresas
      summary: Actualizar empresa
      operationId: updateEmpresa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpresaInput'
      responses:
        '200':
          description: Empresa actualizada
        '404':
          description: No encontrada
    delete:
      tags:
        - Empresas
      summary: Desactivar empresa
      operationId: deleteEmpresa
      responses:
        '200':
          description: Empresa desactivada

  /empresas/{id}/validar:
    patch:
      tags:
        - Empresas
      summary: Validar empresa (solo administración)
      operationId: validarEmpresa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Empresa validada
        '404':
          description: No encontrada

  /admin/contactos:
    get:
      tags:
        - Administración
      summary: Listar contactos solicitados
      operationId: getContactosSolicitados
      parameters:
        - name: estado
          in: query
          schema:
            type: string
            enum: [pendiente, contactado, entrevista, seleccionado, no-seleccionado, proceso-cerrado]
      responses:
        '200':
          description: Listado exitoso
    post:
      tags:
        - Administración
      summary: Registrar solicitud de contacto
      operationId: crearContactoSolicitado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [empresa_id, persona_id]
              properties:
                empresa_id:
                  type: string
                  format: uuid
                persona_id:
                  type: string
                  format: uuid
                notas_admin:
                  type: string
      responses:
        '201':
          description: Contacto registrado
        '409':
          description: Ya existe una solicitud activa

  /admin/contactos/{id}/estado:
    patch:
      tags:
        - Administración
      summary: Actualizar estado de contacto
      operationId: actualizarEstadoContacto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estado]
              properties:
                estado:
                  type: string
                  enum: [pendiente, contactado, entrevista, seleccionado, no-seleccionado, proceso-cerrado]
                notas_admin:
                  type: string
      responses:
        '200':
          description: Estado actualizado

  /admin/estadisticas:
    get:
      tags:
        - Administración
      summary: Estadísticas generales de la plataforma
      operationId: getEstadisticas
      responses:
        '200':
          description: Estadísticas generadas

components:
  schemas:
    PersonaInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: talento@ejemplo.cl
        nivel_educacional:
          type: string
          example: universitaria
        titulo_carrera:
          type: string
          example: Ingeniería Informática
        anios_experiencia:
          type: integer
          example: 3
        competencias:
          type: array
          items:
            type: string
          example: [PHP, Laravel, MySQL, Docker]
        tipo_jornada:
          type: string
          example: completa
        modalidad:
          type: string
          example: hibrido
        rango_renta:
          type: string
          example: 800k-1.2M

    Persona:
      allOf:
        - $ref: '#/components/schemas/PersonaInput'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            codigo_talento:
              type: string
              example: PROV-2026-A1B2
            validado:
              type: boolean
              example: false
            activo:
              type: boolean
              example: true

    PersonaCVCiego:
      type: object
      properties:
        id:
          type: string
          format: uuid
        codigo_talento:
          type: string
        resumen:
          type: string
        nivel_educacional:
          type: string
        titulo_carrera:
          type: string
        anios_experiencia:
          type: integer
        areas_experiencia:
          type: array
          items:
            type: string
        competencias:
          type: array
          items:
            type: string
        tipo_jornada:
          type: string
        modalidad:
          type: string

    EmpresaInput:
      type: object
      required: [nombre_empresa, rut_empresa, email, tipo_empresa, contacto_nombre, contacto_email]
      properties:
        nombre_empresa:
          type: string
          example: TechCorp SpA
        rut_empresa:
          type: string
          example: 76123456-7
        email:
          type: string
          format: email
        tipo_empresa:
          type: string
          enum: [contratacion-directa, est, outsourcing]
        contacto_nombre:
          type: string
        contacto_email:
          type: string
          format: email
        beneficios:
          type: array
          items:
            type: string
          example: [Seguro complementario, Trabajo remoto]

    Empresa:
      allOf:
        - $ref: '#/components/schemas/EmpresaInput'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            validado:
              type: boolean
              example: false
            activo:
              type: boolean
              example: true
